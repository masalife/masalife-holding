<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Masa</title>
    <meta name="description" content="A steady companion for fertility, pregnancy, and the seasons after." />
    <!-- Intentional: do not compete with masalife.app in search until brand is ready. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#2E4A6B" />
    <meta name="referrer" content="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400&display=swap"
    />
    <style>
      :root {
        --deep-blue: #2e4a6b;
        --warm-mist: #f3efea;
        --ink: #2e4a6b;
        --muted: #6b6358;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: var(--warm-mist);
        color: var(--ink);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      main {
        text-align: center;
        max-width: 28rem;
      }
      .logo {
        width: 88px;
        height: 88px;
        margin: 0 auto 1.75rem;
        display: block;
      }
      h1 {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-weight: 500;
        font-size: clamp(3.25rem, 9vw, 4.5rem);
        line-height: 1;
        letter-spacing: -0.01em;
        margin: 0 0 1.5rem;
        color: var(--deep-blue);
      }
      p {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--muted);
        margin: 0 0 2.5rem;
      }
      a {
        color: var(--deep-blue);
        text-decoration: none;
        border-bottom: 1px solid rgba(46, 74, 107, 0.3);
        padding-bottom: 1px;
        font-size: 0.875rem;
        letter-spacing: 0.02em;
      }
      a:hover { border-bottom-color: var(--deep-blue); }
      footer {
        position: fixed;
        bottom: 1.5rem;
        width: 100%;
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        opacity: 0.6;
      }
      @media (prefers-reduced-motion: no-preference) {
        main { animation: fade-in 800ms ease-out both; }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <!-- v1.0 mark — embrace with rising figure. Inner negative space uses canvas color. -->
      <svg
        class="logo"
        viewBox="0 0 1024 1024"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="Masa"
      >
        <path
          d="M512 760 C 512 760, 192 600, 192 400 C 192 300, 270 232, 360 232 C 432 232, 480 272, 512 320 Z"
          fill="#8FA3BE"
        />
        <path
          d="M512 760 C 512 760, 832 600, 832 400 C 832 300, 754 232, 664 232 C 592 232, 544 272, 512 320 Z"
          fill="#B6CAE0"
        />
        <path
          d="M512 660 C 512 660, 340 558, 340 432 C 340 372, 384 332, 436 332 C 476 332, 500 356, 512 384 C 524 356, 548 332, 588 332 C 640 332, 684 372, 684 432 C 684 558, 512 660, 512 660 Z"
          fill="#F3EFEA"
        />
        <circle cx="512" cy="190" r="78" fill="#B6CAE0" />
      </svg>

      <h1>masa</h1>
      <p>A steady companion for fertility, pregnancy, and the seasons after.</p>
      <!-- TODO before ship: confirm hello@masalife.app is monitored, or swap for live inbox. -->
      <a href="mailto:hello@masalife.app">hello@masalife.app</a>
    </main>
    <footer>© 2026 Masa Life LLC</footer>
  </body>
</html>
